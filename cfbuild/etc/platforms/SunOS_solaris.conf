# Platform: Solaris (uname -s returns SunOS) — alias to solaris.conf
# This file exists so _resolve_platform_config_file can find it via kernel_os pattern.
os_family=solaris
packaging=solaris
dep_packaging=solaris
shell=/usr/xpg4/bin/sh
make=gmake
patch=/opt/csw/bin/gpatch
fuser=/usr/sbin/fuser
cc=gcc
sha256_cmd=digest -a sha256
sed_inplace=no
has_mktemp=no
has_systemd=no
rpath_flag=-Wl,-R,
ldflags=-L@PREFIX@/lib -Wl,-R@PREFIX@/lib
cflags=
path_prepend=/opt/csw/bin:/usr/xpg4/bin:/usr/ccs/bin
extra_deps=libgcc libiconv sasl2
