# Platform: HP-UX (kernel name lookup alias)
os_family=hpux
packaging=hpux
dep_packaging=hpux
shell=/bin/sh
make=gmake
patch=patch
fuser=/usr/sbin/fuser
cc=gcc
sha256_cmd=openssl dgst -sha256
sed_inplace=no
has_mktemp=no
has_systemd=no
rpath_flag=-Wl,+b
ldflags=-L@PREFIX@/lib -Wl,+b@PREFIX@/lib
cflags=
path_prepend=/usr/contrib/bin
extra_deps=libgcc libiconv sasl2
