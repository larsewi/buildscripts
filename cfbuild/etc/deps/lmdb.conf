# Dependency: lmdb
name=lmdb
version=0.9.33
source=openldap-LMDB_0.9.33.tar.gz
roles=agent hub
build_type=custom
build_script=lmdb.sh
# Only apply patches compatible with the native Makefile (pure C changes).
# Autoconf patches (0003, 0004, 0005, 0009, 0010) are excluded because
# the cfbuild system uses the upstream Makefile directly.
patches=0001-Add-extra-tools-and-CFEngine-modifications-for-LMDB.patch 0002-Do-not-abort-if-a-user-define-assert-function-is-cal.patch 0006-_XOPEN_SOURCE-500-i.e.-XPG5-can-t-be-used-with-C99-c.patch 0007-fix-warnings.patch 0008-Do-not-put-functions-into-a-separate-text-section-on.patch
