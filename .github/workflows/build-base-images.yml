name: Build base images

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build (or "all")
        required: true
        type: choice
        options:
          - all
          - ubuntu-20
          - ubuntu-22
          - ubuntu-24
          - debian-11
          - debian-12
      force:
        description: Overwrite existing images in the registry
        required: false
        type: boolean
        default: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        platform: ${{ inputs.platform == 'all' && fromJson('["ubuntu-20","ubuntu-22","ubuntu-24","debian-11","debian-12"]') || fromJson(format('["{0}"]', inputs.platform)) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: ./build-in-container.py --platform ${{ matrix.platform }} --push-image ${{ inputs.force && '--force' || '' }}
